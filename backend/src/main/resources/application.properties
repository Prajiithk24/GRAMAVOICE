spring.application.name=gramavoice-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${GRAMAVOICE_DB_URL:jdbc:mysql://localhost:3306/gramavoice?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${GRAMAVOICE_DB_USERNAME:root}
spring.datasource.password=${GRAMAVOICE_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false

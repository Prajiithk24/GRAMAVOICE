spring.application.name=gramavoice-backend
server.port=${SERVER_PORT:8080}

spring.datasource.url=${GRAMAVOICE_DB_URL:jdbc:h2:file:./data/gramavoice;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL}
spring.datasource.username=${GRAMAVOICE_DB_USERNAME:sa}
spring.datasource.password=${GRAMAVOICE_DB_PASSWORD:}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false

sarvam.enabled=${SARVAM_ENABLED:true}
sarvam.api-key=${SARVAM_API_KEY:}
sarvam.base-url=${SARVAM_BASE_URL:https://api.sarvam.ai}
sarvam.model=${SARVAM_MODEL:sarvam-30b}

app.auth.secret=${APP_AUTH_SECRET:change-this-secret-before-deploy}
